{% extends 'base.html' %}


{% block content %}

<div class="container">
<br/><br/>
        	<div class="card mb-3">
  <div class="row g-0">
    <div class="col-md-4">
      <img src="{{ produkt.zdjecie.url }}" class="img-fluid rounded-start" alt="...">
    </div>
    <div class="col-md-8">
      <div class="card-body">
        <center>
        <h5 class="card-title">{{ produkt.nazwa }}</h5>
        <p class="card-text">{{ produkt.opis }}</p>

        {% if produkt.czy_promocja %}
                                        <div class="d-flex
                                   justify-content-center small
                                   text-warning mb-2">
                                   <div class="bi-star-fill"></div>
                                   &nbsp;Promocja!&nbsp;
                                   <div class="bi-star-fill"></div>
                                </div>





                                    <!-- Product price-->
                                    <strike>
                                    {{ produkt.cena }}zł
                                    </strike> 
                                    &nbsp;
                                    {{ produkt.promocja_cena }}zł

        {% else %}
            {{ produkt.cena }}zł
        {% endif%}
        <br/><br/>
      <div class="row justify-content-center">
        <div class="col-md-2"> Ilość:</div>
        <div class="col-md-2">
      <select class="form-select form-select-sm" id="qty-cart">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
        </div>
      </div>
        <br/><br/>
        <a href="{% url 'home' %}" class="btn btn-primary">Strona główna</a>

        <button class="btn btn-success" type="button" value="{{produkt.id}}" id="add_cart">Dodaj do koszyka</button>
        </center>
      </div>
    </div>
  </div>
</div> 
</div>
<br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/><br/>

<script>
$(document).on('click', '#add_cart', function(e){
  e.preventDefault();
  $.ajax({
    type: 'POST',
    url: '{% url 'cart_add' %}',
    data: {
      product_id: $('#add_cart').val(),
      product_qty: $('#qty-cart option:selected').text(),
      csrfmiddlewaretoken: '{{ csrf_token }}',
      action: 'post'
    },

    success: function(json){
      //console.log(json)

      document.getElementById('cart_q').textContent = json.ilosc
      location.reload();
    },

    error: function(xhr, errmsg, err){

    }
  });
})

</script>

{% endblock %}
