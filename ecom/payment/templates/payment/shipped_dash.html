{% extends 'base.html' %}
{% block content %}

<!-- Header-->
        

        <div class="container">
            <div class="row">
                <center>
                    <div class="col-8">
                        <br/><br/>
<h3>Wysłane zamówienia</h3>
<table class="table table-striped table-hover table-bordered">
  <thead class="table-dark">
    <tr>
      <th scope="col">Zamówienie</th>
      <th scope="col">Koszt</th>
      <th scope="col">Email</th>
      <th scope="col">Data wysłania</th>
      <th scope="col">Wysłane</th>
    </tr>
  </thead>
  <tbody>
    {% for item in zamowienia %}
    <tr>
      <td><a href="{% url 'orders' item.id %}">{{ item.id }}</a></td>
      <td>{{ item.koszt }}zł</td>
      <td>{{ item.email }}</td>
      <td>{{ item.data_wyslania }}</td>
       <td>
        <form method="POST">
          {% csrf_token %}
          <input type="hidden" name="shipping_status" value="false">
          <input type="hidden" name="num" value={{item.id}}>
          <button type="Submit" class="btn btn-danger btn-sm">Oznacz jako niewysłane</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  
    
  </tbody>
</table>


<br/><br/>
                    </div>
                </center>
            </div>
        </div>

{% endblock %}
